const mx=c.a||3,used=wgh[cwi].length;
setTimeout(()=>{if(ok){dec[cwi]=true;SFX.ws();const ad=pz.c.every((_,i)=>dec[i]||fld[i]),allD=dec.every(d=>d);
if(ad){go=true;gw=allD;if(allD){pl++;wn++;sk++;SFX.mc()}else{pl++;sk=0}localStorage.setItem('d-p',pl);localStorage.setItem('d-w',wn);localStorage.setItem('d-s',sk);svD()}
else{ks={};ci='';const nx=fNU();if(nx!==-1)cwi=nx}}
else if(used>=mx){fld[cwi]=true;SFX.no();const ad=pz.c.every((_,i)=>dec[i]||fld[i]);
if(ad){go=true;gw=false;pl++;sk=0;localStorage.setItem('d-p',pl);localStorage.setItem('d-s',0);svD()}
else{ks={};ci='';const nx=fNU();if(nx!==-1)cwi=nx}}
else{SFX.no();ci=''}anim=false;render()},c.w.length*100+400)}

function fNU(){for(let i=cwi+1;i<pz.c.length;i++){if(!dec[i]&&!fld[i])return i}for(let i=0;i<cwi;i++){if(!dec[i]&&!fld[i])return i}return -1}
function svD(){const d=dn(),td=JSON.parse(localStorage.getItem('d-td')||'{}');if(bonus)td.bonus=true;else td.main=true;td.day=d;localStorage.setItem('d-td',JSON.stringify(td))}

// AD
let acI=null;
function showAd(){document.getElementById('adov').classList.remove('hidden');let t=5;document.getElementById('adt').textContent=t;const sk=document.getElementById('adsk');sk.classList.add('dis');sk.innerHTML='Skip in <span id="adt">5</span>s';
acI=setInterval(()=>{t--;const te=document.getElementById('adt');if(te)te.textContent=t;if(t<=0){clearInterval(acI);sk.classList.remove('dis');sk.textContent='Continue to bonus mission →'}},1000)}
function skipAd(){clearInterval(acI);document.getElementById('adov').classList.add('hidden');start(dn()+13,true)}
// Make skipAd global
window.showAd=showAd;window.skipAd=skipAd;window.shr=shr;window.toggleMusic=toggleMusic;

function shr(){const d=dn();let g='';wgh.forEach(wh=>{wh.forEach(gg=>{g+=gg.results.map(r=>r==='correct'?'🟩':r==='present'?'🟨':'⬛').join('')+'\n'})});
const t='Spydle #'+(bonus?d+'B':d)+' '+(gw?'🔓':'🔒')+'\n'+g.trim()+'\nspydlegame.com';
if(navigator.share)navigator.share({title:'Spydle',text:t}).catch(()=>{});
else if(navigator.clipboard){navigator.clipboard.writeText(t);document.getElementById('sbtn').textContent='✓ Copied!';setTimeout(()=>{document.getElementById('sbtn').textContent='📋 Share'},2500)}}

document.addEventListener('keydown',e=>{if(go||anim)return;if(e.key==='Enter'){sub();return}if(e.key==='Backspace'){e.preventDefault();del();return}const ch=e.key.toUpperCase();if(/^[A-Z]$/.test(ch))typ(ch)});

// INIT
(()=>{const d=dn(),td=JSON.parse(localStorage.getItem('d-td')||'{}');if(td.day!==d)localStorage.removeItem('d-td');start(d)})();
</script>
